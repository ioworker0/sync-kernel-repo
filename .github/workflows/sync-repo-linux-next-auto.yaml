name: SYNC REPO LINUX NEXT AUTO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'   # twice a day: 00:00 and 12:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        path: sync-repo

    # - name: use SSH key
    #   run: |
    #     mkdir -p ~/.ssh
    #     echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
    #     chmod 600 ~/.ssh/id_rsa
    
    - name: Create GitHub App token for target repo
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.SYNC_APP_ID }}
        private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
        owner: ioworker0
        repositories: linux
        permission-contents: write

    - name: clone repo
      run: |
        git clone -v git://git.kernel.org/pub/scm/linux/kernel/git/next/linux-next

    - name: sync linux repo
      run: |
        cd linux-next
        git checkout master
        git checkout master && git pull
        git checkout -B linux-next
        # git push -f git@github.com:ioworker0/linux.git linux-next
        git push --force \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/ioworker0/linux.git \
            HEAD:refs/heads/linux-next
